<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRA-ODP-v1.0 Mastery Sprint Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9f9f9; color: #1a1a1a; padding: 1rem; line-height: 1.6; }
        .container { max-width: 100%; margin: 0 auto; }
        header { margin-bottom: 2rem; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }

        .progress-bar-container { background: white; border: 1px solid #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 2rem; overflow: hidden; }
        .progress-bar { height: 100%; background: #2ecc71; transition: width 0.3s ease; width: 0%; }
        .phases { display: grid; grid-template-columns: 1fr; gap: 1rem; }

        .phase-info h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; }
        .phase-info p { font-size: 0.85rem; color: #666; margin: 0.25rem 0; }
        .phase-badge { font-size: 0.75rem; background: #f0f0f0; padding: 0.4rem 0.6rem; border-radius: 4px; white-space: nowrap; font-weight: 500; }
        .phase-badge.complete { background: #2ecc71; color: white; }
        .phase-badge.in-progress { background: #3498db; color: white; }
        .phase-stats { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0.25rem; }

</head>
<body>
    <div class="container">
        <header>
            <h1>SRA-ODP-v1.0</h1>
            <p style="color: #666; font-size: 0.9rem;">Mastery Sprint Tracker | June 16, 2026</p>
        </header>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Points</div>
                <div class="stat-value" id="points-display">0/170</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Progress</div>
                <div class="stat-value" id="progress-display">0%</div>
            </div>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="phases" id="phases-container"></div>
    </div>
    <script>
        const phases = [
            { id: 0, hour: '0', dimension: 'Map + Tutor Setup', time: '15 min', points: 5, task: 'Hand-draw six-dimension map, set tutor prompt', status: 1 },
            { id: 1, hour: '1', dimension: 'Billing Integrity + Reactivation', time: '50 min', points: 15, task: 'Teach-back from memory; feedback', status: 1 },
            { id: 2, hour: '2', dimension: 'New Patient Conversion + Scheduling', time: '50 min', points: 15, task: 'Teach-back from memory; feedback', status: 1 },
            { id: 3, hour: '3', dimension: 'Case Plan Adherence + Revenue Intel', time: '50 min', points: 15, task: 'Teach-back from memory; feedback', status: 0 },
            { id: 4, hour: '4', dimension: 'All Six (Interleaved)', time: '50 min', points: 20, task: 'Random quiz; elaborate on answers', status: 0 },
            { id: 5, hour: '5', dimension: 'BRAND-CR + Metrics', time: '50 min', points: 20, task: 'Drill 8 scenarios; instant feedback', status: 0 },
            { id: 6, hour: 'NAP', dimension: 'Memory Consolidation', time: '60-90 min', points: 30, task: 'Protected sleep; slow-wave consolidation', status: 0 },
            { id: 7, hour: '6', dimension: 'Flow-Card Role-Play', time: '50 min', points: 25, task: 'Two runs of Version A & B + objections', status: 0 },
            { id: 8, hour: '7', dimension: 'Final Rehearsal', time: '50 min', points: 25, task: 'Mixed quiz + objections + full run', status: 0 }
        ];

        const ratings = {};
        const states = {};

        function loadState() {
            const saved = localStorage.getItem('sra-odp-state');
            if (saved) {
                const data = JSON.parse(saved);
                Object.assign(ratings, data.ratings);
                Object.assign(states, data.states);
            }
            phases.forEach(p => {
                if (!states.hasOwnProperty(p.id)) states[p.id] = p.status;
                if (!ratings.hasOwnProperty(p.id)) ratings[p.id] = 0;
            });
        }

        function saveState() {
            localStorage.setItem('sra-odp-state', JSON.stringify({ ratings, states }));
        }

        function updateUI() {
            const container = document.getElementById('phases-container');
            container.innerHTML = '';
            let totalPts = 0;
            let completedCount = 0;

            phases.forEach(phase => {
                const status = states[phase.id] || 0;
                const rating = ratings[phase.id] || 0;
                const earnedPts = status === 2 ? Math.round((rating / 5) * phase.points) : 0;
                totalPts += earnedPts;
                if (status === 2) completedCount += 1;

                const card = document.createElement('div');
                card.className = `phase-card ${status === 2 ? 'complete' : status === 1 ? 'in-progress' : ''}`;
                const statusLabel = status === 0 ? 'Not Started' : status === 1 ? 'In Progress' : 'Complete';

                card.innerHTML = `
                    <div class="phase-header">
                        <div class="phase-info">
                            <h3>Hour ${phase.hour}</h3>
                            <p>${phase.dimension}</p>
                            <p style="color: #999; font-size: 0.8rem;">${phase.time}</p>
                        </div>
                        <div class="phase-stats">
                            <div class="phase-badge ${status === 2 ? 'complete' : status === 1 ? 'in-progress' : ''}">${statusLabel}</div>
                            <div class="points">${earnedPts}/${phase.points}</div>
                        </div>
                    </div>
                    <div class="task-desc">${phase.task}</div>
                    <div class="controls">
                        <div>
                            <div class="control-label">Status</div>
                            <select onchange="updateStatus(${phase.id}, this.value)">
                                <option value="0" ${status === 0 ? 'selected' : ''}>Not Started</option>
                                <option value="1" ${status === 1 ? 'selected' : ''}>In Progress</option>
                                <option value="2" ${status === 2 ? 'selected' : ''}>Complete</option>
                            </select>
                        </div>
                        <div>
                            <div class="control-label">Quality Score (1-5)</div>
                            <input type="number" min="0" max="5" value="${rating}" onchange="updateRating(${phase.id}, this.value)">
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            const totalPossible = phases.reduce((sum, p) => sum + p.points, 0);
            const pct = totalPossible > 0 ? Math.round((totalPts / totalPossible) * 100) : 0;
            document.getElementById('points-display').textContent = `${totalPts}/${totalPossible}`;
            document.getElementById('progress-display').textContent = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        function updateStatus(id, value) {
            states[id] = parseInt(value);
            saveState();
            updateUI();
        }

        function updateRating(id, value) {
            ratings[id] = Math.max(0, Math.min(5, parseInt(value) || 0));
            saveState();
            updateUI();
        }

        loadState();
        updateUI();
    </script>
</body>
</html>
